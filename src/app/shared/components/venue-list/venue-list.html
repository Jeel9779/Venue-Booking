<div class="bg-white p-6 rounded-xl shadow-sm">
    <div class="flex justify-between mb-4">
        <h3 class="font-bold">Popular Venues</h3>
    </div>

    <div class="space-y-4">
        <div *ngFor="let v of venues" class="flex justify-between items-center">
            <div class="flex gap-3 items-center">
                <img [src]="v.img" class="w-10 h-10 rounded" />
                <div>
                    <p class="font-semibold text-sm">{{v.name}}</p>
                    <p class="text-xs text-gray-400">{{v.bookings}} bookings</p>
                </div>
            </div>

            <div class="text-right">
                <p class="font-bold">{{v.revenue | currency}}</p>
            </div>
        </div>
    </div>
</div>
