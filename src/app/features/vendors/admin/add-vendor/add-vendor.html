<div class="min-h-screen flex items-start justify-center p-6 bg-gray-200">

  <div class="w-full max-w-5xl mx-auto mt-10 bg-white/90 backdrop-blur-xl rounded-3xl p-8 
              shadow-lg border border-gray-300">

    <!-- HEADER -->
    <h2 class="text-2xl font-semibold text-gray-800 flex items-center gap-3 mb-6">
      <div class="p-2 bg-indigo-50 rounded-lg">

      </div>
      Add New Vendor
    </h2>

    <form #vendorForm="ngForm" (ngSubmit)="submit(vendorForm)" class="space-y-6">

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

        <!-- ================= LEFT ================= -->
        <div class="space-y-4">

          <!-- PERSONAL INFO -->
          <div>
            <h3 class="text-sm font-semibold text-gray-600 mb-4 flex items-center gap-2">

              Personal Info
            </h3>

            <!-- NAME -->
            <div class="group bg-white rounded-xl p-4 mb-3 border border-gray-200 
              hover:border-indigo-400 hover:shadow-md transition-all duration-200">
              <div class="flex items-center gap-3">
                <div class="p-2 bg-indigo-50 rounded-lg">

                </div>
                <input [(ngModel)]="vendor.fullName" name="fullName" required placeholder="Full Name"
                  class="w-full outline-none text-sm bg-transparent" />
              </div>
            </div>

            <!-- EMAIL -->
            <div class="group bg-white rounded-xl p-4 mb-3 border border-gray-200 
              hover:border-indigo-400 hover:shadow-md transition-all duration-200">
              <div class="flex items-center gap-3">
                <div class="p-2 bg-indigo-50 rounded-lg">

                </div>
                <input [(ngModel)]="vendor.email" name="email" required placeholder="Email"
                  class="w-full outline-none text-sm bg-transparent" />
              </div>
            </div>

            <!-- PHONE -->
            <div class="group bg-white rounded-xl p-4 border border-gray-200 
              hover:border-indigo-400 hover:shadow-md transition-all duration-200">
              <div class="flex items-center gap-3">
                <div class="p-2 bg-indigo-50 rounded-lg">
                </div>
                <input [(ngModel)]="vendor.phone" name="phone" required placeholder="Phone Number"
                  class="w-full outline-none text-sm bg-transparent" />
              </div>
            </div>
          </div>

          <!-- BUSINESS INFO -->
          <div>
            <h3 class="text-sm font-semibold text-gray-600 mb-4 flex items-center gap-2">

              Business Info
            </h3>

            <!-- BUSINESS NAME -->
            <div class="group bg-white rounded-xl p-4 mb-3 border border-gray-200 
              hover:border-purple-400 hover:shadow-md transition-all duration-200">
              <div class="flex items-center gap-3">
                <div class="p-2 bg-purple-50 rounded-lg">

                </div>
                <input [(ngModel)]="vendor.businessName" name="businessName" required placeholder="Business Name"
                  class="w-full outline-none text-sm bg-transparent" />
              </div>
            </div>

            <!-- BUSINESS TYPE -->
            <div class="group bg-white rounded-xl p-4 border border-gray-200 
              hover:border-purple-400 hover:shadow-md transition-all duration-200">
              <div class="flex items-center gap-3">
                <div class="p-2 bg-purple-50 rounded-lg">

                </div>
                <input [(ngModel)]="vendor.businessType" name="businessType" required placeholder="Business Type"
                  class="w-full outline-none text-sm bg-transparent" />
              </div>
            </div>
          </div>

        </div>

        <!-- ================= RIGHT ================= -->
        <div class="space-y-4">

          <!-- LOCATION -->
          <div>
            <h3 class="text-sm font-semibold text-gray-600 mb-4 flex items-center gap-2">

              Location
            </h3>

            <!-- STATE -->
            <div class="group bg-white rounded-xl p-4 mb-3 border border-gray-200 
              hover:border-indigo-400 hover:shadow-md transition-all duration-200">
              <div class="flex items-center gap-3">
                <div class="p-2 bg-indigo-50 rounded-lg">

                </div>
                <input [(ngModel)]="vendor.state" name="state" placeholder="State"
                  class="w-full outline-none text-sm bg-transparent" />
              </div>
            </div>

            <!-- PINCODE -->
            <div class="group bg-white rounded-xl p-4 mb-3 border border-gray-200 
              hover:border-indigo-400 hover:shadow-md transition-all duration-200">
              <div class="flex items-center gap-3">
                <div class="p-2 bg-indigo-50 rounded-lg">

                </div>
                <input [(ngModel)]="vendor.pincode" name="pincode" placeholder="Pincode"
                  class="w-full outline-none text-sm bg-transparent" />
              </div>
            </div>

            <!-- ADDRESS -->
            <div class="group bg-white rounded-xl p-4 border border-gray-200 
              hover:border-indigo-400 hover:shadow-md transition-all duration-200">
              <div class="flex items-start gap-3">
                <div class="p-2 bg-indigo-50 rounded-lg mt-1">

                </div>
                <textarea [(ngModel)]="vendor.address" name="address" placeholder="Address"
                  class="w-full outline-none text-sm bg-transparent"></textarea>
              </div>
            </div>
          </div>

          <!-- DOCUMENTS -->
          <div>
            <h3 class="text-sm font-semibold text-gray-600 mb-4 flex items-center gap-2">

              Documents
            </h3>

            <!-- GOV FILE -->
            <div
              class="group bg-white rounded-xl p-4 mb-3 border border-gray-200 hover:border-indigo-400 hover:shadow-md transition-all duration-200">
              <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                  <div class="p-2 bg-indigo-50 rounded-lg">

                  </div>
                  <div>
                    <p class="text-sm font-semibold text-gray-800">Government ID</p>
                    <p class="text-xs text-gray-500 truncate max-w-[160px]">
                      {{ govFileName || 'Upload ID proof' }}
                    </p>
                  </div>
                </div>

                <div class="flex items-center gap-3">
                  @if (govFileName) {

                  }

                  <label
                    class="cursor-pointer bg-indigo-50 text-indigo-700 text-xs px-3 py-1.5 rounded-lg hover:bg-indigo-100 transition">
                    Upload
                    <input type="file" (change)="onGovFile($event)" class="hidden" />
                  </label>
                </div>
              </div>
            </div>

            <!-- LICENSE FILE -->
            <div
              class="group bg-white rounded-xl p-4 border border-gray-200 hover:border-purple-400 hover:shadow-md transition-all duration-200">
              <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                  <div class="p-2 bg-purple-50 rounded-lg">

                  </div>
                  <div>
                    <p class="text-sm font-semibold text-gray-800">Business License</p>
                    <p class="text-xs text-gray-500 truncate max-w-[160px]">
                      {{ licenseFileName || 'Upload license document' }}
                    </p>
                  </div>
                </div>

                <div class="flex items-center gap-3">
                  @if (licenseFileName) {

                  }

                  <label
                    class="cursor-pointer bg-purple-50 text-purple-700 text-xs px-3 py-1.5 rounded-lg hover:bg-purple-100 transition">
                    Upload
                    <input type="file" (change)="onLicenseFile($event)" class="hidden" />
                  </label>
                </div>
              </div>
            </div>

          </div>

        </div>

      </div>

      <!-- BUTTON -->
      <button [disabled]="vendorForm.invalid || isLoading"
        class="w-full mt-4 bg-linear-to-r from-indigo-700 to-purple-700 text-white py-3 rounded-xl font-medium hover:scale-[1.02] transition">
        @if (!isLoading) {
        Add Vendor
        } @else {
        <span class="flex justify-center gap-2">
          Saving...
        </span>
        }
      </button>

    </form>

  </div>

</div>
