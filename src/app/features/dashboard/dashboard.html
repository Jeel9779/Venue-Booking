<div class="p-4 md:p-6 space-y-6">

  <!-- 🔹 CARDS -->
  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5">

    @for (item of stats(); track item.title) {
      <app-stat-card
        [title]="item.title"
        [value]="item.value"
        [change]="item.change"
        [icon]="item.icon"
        [highlight]="item.highlight ?? false">
      </app-stat-card>
    }

  </div>

  <!-- 🔹 TABLE -->
  <div class="bg-white border border-gray-200 rounded-2xl shadow-sm overflow-hidden">
    <app-table [data]="tableData"></app-table>
  </div>

  <!-- 🔹 CHART + SYSTEM -->
  <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

    <!-- CHART -->
    <div class="lg:col-span-2 h-full">
      <app-revenue-chart></app-revenue-chart>
    </div>

    <!-- SYSTEM HEALTH -->
    <div class="bg-green-900 text-white rounded-2xl p-6 shadow-lg h-full">

      <h3 class="text-lg font-semibold mb-2">System Health</h3>
      <p class="text-sm opacity-80 mb-4">
        All core systems are operational.
      </p>

      <div class="space-y-4">

        <div>
          <p class="text-xs">API LATENCY</p>
          <div class="w-full h-2 bg-green-800 rounded mt-1">
            <div class="w-[80%] h-2 bg-green-400 rounded"></div>
          </div>
        </div>

        <div>
          <p class="text-xs">SERVER LOAD</p>
          <div class="w-full h-2 bg-green-800 rounded mt-1">
            <div class="w-[40%] h-2 bg-green-400 rounded"></div>
          </div>
        </div>

      </div>

    </div>

  </div>

</div>
