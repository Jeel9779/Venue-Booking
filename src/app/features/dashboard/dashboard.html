<div class="p-6 bg-gray-200 min-h-screen">

  <!-- HEADER -->
  <div class="flex justify-between mb-6">
    <div>
      <h1 class="text-2xl font-bold">Analytics Overview</h1>
    </div>
  </div>

  <!-- STATS -->
  <div class="grid md:grid-cols-2 lg:grid-cols-4 gap-6 mb-6">
    <app-stat-card *ngFor="let s of service.stats()" [title]="s.title" [value]="s.value" [change]="s.change"
      [color]="s.color" />
  </div>

  <!-- CHARTS -->
  <div class="grid lg:grid-cols-3 gap-6 mb-6">
    <div class="lg:col-span-2">
      <app-chart />
    </div>
    <app-donut-chart />
  </div>

  <!-- BOTTOM -->
  <div class="grid lg:grid-cols-3 gap-6">
    <div class="lg:col-span-2">
      <app-venue-list [venues]="service.venues()" />
    </div>
    <app-insight-card />
  </div>

</div>
