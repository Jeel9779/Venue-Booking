<div
  class="min-h-screen bg-[radial-gradient(ellipse_at_top_right,var(--tw-gradient-stops))] from-slate-50 via-white to-indigo-50/30 p-6 md:p-12">

  <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-end gap-6 mb-16">
    <div class="space-y-2">
      <div
        class="inline-flex items-center px-3 py-1 rounded-full bg-indigo-50 text-indigo-600 text-xs font-bold tracking-wider uppercase border border-indigo-100">
        Admin Dashboard
      </div>
      <h1 class="text-4xl md:text-5xl font-black text-slate-900 tracking-tight">
        Subscription <span
          class="text-transparent bg-clip-text bg-linear-to-r from-indigo-600 to-violet-600">Tiers</span>
      </h1>
      <p class="text-slate-500 text-lg font-medium max-w-md">Scale your vendor ecosystem with flexible, high-conversion
        pricing plans.</p>
    </div>

    <button (click)="openAddForm()"
      class="group relative bg-blue-900 hover:bg-indigo-600 text-white px-8 py-4 rounded-2xl font-bold transition-all duration-300 shadow-2xl shadow-indigo-200 active:scale-95 flex items-center gap-3 overflow-hidden">
      <div
        class="absolute inset-0 w-1/4 h-full bg-white/10 skew-x-45 -translate-x-full group-hover:translate-x-[400%] transition-transform duration-700">
      </div>
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4" />
      </svg>
      Add New Plan
    </button>
  </div>

  <ng-container *ngIf="plans$ | async as plans; else loading">
    <div *ngIf="plans.length === 0"
      class="flex flex-col items-center justify-center py-24 bg-white/50 backdrop-blur-md rounded-[3rem] border-2 border-dashed border-slate-200 max-w-2xl mx-auto shadow-sm">
      <div class="w-20 h-20 bg-slate-100 rounded-full flex items-center justify-center mb-6">
        <svg class="w-10 h-10 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
        </svg>
      </div>
      <p class="text-slate-500 font-bold text-xl">No active plans found</p>
      <button (click)="openAddForm()"
        class="text-indigo-600 font-bold mt-2 hover:text-indigo-700 transition-colors">Start by creating a Basic plan
        &rarr;</button>
    </div>

    <div *ngIf="plans.length > 0" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10 max-w-7xl mx-auto">
      <div *ngFor="let plan of plans; let i = index"
        class="group relative bg-white rounded-[2.5rem] p-1 shadow-sm transition-all duration-500 hover:shadow-2xl hover:shadow-indigo-200/40 hover:-translate-y-2 border border-slate-400"
        [ngClass]="{'ring-2 ring-indigo-500 border-transparent': plan.isActive}">

        <div class="bg-white rounded-[2.3rem] p-8 h-full flex flex-col">

          <div class="flex justify-between items-center mb-10">
            <div class="p-3 rounded-2xl"
              [ngClass]="plan.isActive ? 'bg-indigo-200 text-indigo-600' : 'bg-slate-300 text-slate-400'">
              <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" *ngIf="i === 0">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
              </svg>
              <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" *ngIf="i === 1">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
              </svg>
              <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" *ngIf="i >= 2">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-7.714 2.143L11 21l-2.286-6.857L1 12l7.714-2.143L11 3z" />
              </svg>
            </div>
            <div *ngIf="i === 1 && plan.isActive"
              class="bg-linear-to-r from-amber-400 to-orange-500 text-white px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-[0.15em] shadow-lg shadow-orange-100">
              Most Popular
            </div>
          </div>

          <h3 class="text-2xl font-extrabold text-slate-800 tracking-tight">{{ plan.name }}</h3>

          <div class="mt-4 mb-6 flex items-baseline gap-1">
            <span class="text-5xl font-black text-slate-900 leading-none">₹{{ plan.price }}</span>
            <span class="text-slate-400 font-bold">/{{ plan.duration }}d</span>
          </div>

          <p class="text-slate-500 text-sm font-medium leading-relaxed min-h-12 mb-8">{{ plan.description }}</p>

          <div class="space-y-4 mb-10 grow">
            <div *ngFor="let feat of plan.features"
              class="flex items-start gap-3 text-sm font-bold text-slate-600 group/item">
              <div
                class="mt-0.5 rounded-full p-0.5 bg-emerald-200 text-emerald-500 group-hover/item:bg-emerald-500 group-hover/item:text-white transition-colors">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" />
                </svg>
              </div>
              {{ feat }}
            </div>
          </div>

          <div class="flex items-center gap-3 pt-6 border-t border-slate-50">
            <button (click)="editPlan(plan)"
              class="flex-1 bg-indigo-300 hover:bg-indigo-500 hover:text-white text-slate-600 font-bold py-3.5 rounded-2xl transition-all flex justify-center items-center gap-2 border border-transparent hover:border-indigo-100">
              Edit
            </button>
            <button (click)="deletePlan(plan.id)"
              class="px-5 py-3.5 bg-red-300 hover:bg-red-400 hover:text-white text-slate-900 rounded-2xl transition-all border border-transparent hover:border-red-100">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
              </svg>
            </button>
          </div>
        </div>
      </div>
    </div>
  </ng-container>

  <ng-template #loading>
    <div class="flex flex-col justify-center items-center py-40 space-y-4">
      <div class="relative w-16 h-16">
        <div class="absolute inset-0 rounded-full border-4 border-indigo-100"></div>
        <div class="absolute inset-0 rounded-full border-4 border-indigo-600 border-t-transparent animate-spin"></div>
      </div>
      <p class="text-slate-400 font-bold tracking-widest uppercase text-xs">Fetching Data</p>
    </div>
  </ng-template>

  <app-plan-form *ngIf="showForm" [planData]="selectedPlan" (closeForm)="showForm = false"
    (planAdded)="loadPlans()"></app-plan-form>
</div>
