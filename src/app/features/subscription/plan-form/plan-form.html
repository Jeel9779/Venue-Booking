<div
  class="fixed inset-0 bg-slate-900/40 backdrop-blur-md flex items-center justify-center z-50 p-4 transition-all duration-500">
  <div
    class="bg-white w-full max-w-xl rounded-[2.5rem] shadow-2xl border border-white/20 overflow-hidden transform transition-all scale-100">

    <div class="px-10 py-8 border-b border-slate-50 flex justify-between items-center bg-slate-300">
      <div>
        <h2 class="text-2xl font-black text-slate-800 tracking-tight">
          {{ planData ? 'Refine' : 'Architect' }} Plan
        </h2>
        <p class="text-slate-400 text-[10px] font-black uppercase mt-1 tracking-widest">Pricing Configuration</p>
      </div>
      <button (click)="closeForm.emit()"
        class="w-10 h-10 flex items-center justify-center bg-white rounded-full text-slate-400 hover:text-red-500 transition-all border border-slate-100">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>

    <form [formGroup]="planForm" (ngSubmit)="onSubmit()" class="p-10 space-y-6">

      <div class="grid grid-cols-2 gap-6">
        <div class="col-span-2 sm:col-span-1 space-y-2">
          <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Plan Name</label>
          <input type="text" formControlName="name" placeholder="e.g. Enterprise"
            class="w-full px-5 py-4 bg-slate-50 border border-slate-300 rounded-2xl focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 focus:bg-white outline-none transition-all font-bold text-slate-700">
        </div>
        <div class="col-span-2 sm:col-span-1 space-y-2">
          <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Price (₹)</label>
          <div class="relative">
            <span class="absolute left-5 top-1/2 -translate-y-1/2 text-slate-400 font-bold">₹</span>
            <input type="number" formControlName="price"
              class="w-full pl-10 pr-5 py-4 bg-slate-50 border border-slate-300 rounded-2xl focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 focus:bg-white outline-none transition-all font-bold text-slate-700">
          </div>
        </div>
      </div>

      <div class="space-y-2">
        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Description</label>
        <textarea formControlName="description" rows="2" placeholder="Describe the plan benefits..."
          class="w-full px-5 py-4 bg-slate-50 border border-slate-300 rounded-2xl focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 focus:bg-white outline-none transition-all font-bold text-slate-700 resize-none"></textarea>
      </div>

      <div class="space-y-4">
        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Core Features</label>
        <div class="relative group">
          <input #featInput type="text" placeholder="Add feature..." (keyup.enter)="addFeature(featInput)"
            class="w-full pl-5 pr-20 py-4 bg-slate-50 border border-slate-300 rounded-2xl focus:ring-4 focus:ring-indigo-500/10 outline-none transition-all font-bold text-slate-700">
          <button type="button" (click)="addFeature(featInput)"
            class="absolute right-3 top-1/2 -translate-y-1/2 bg-slate-800 text-white px-4 py-2 rounded-xl text-[10px] font-black hover:bg-indigo-600 transition-colors">
            ADD
          </button>
        </div>
        <div class="flex flex-wrap gap-2">
          <span *ngFor="let feat of currentFeatures; let i = index"
            class="inline-flex items-center gap-2 px-4 py-2 bg-indigo-50 text-indigo-700 rounded-xl text-xs font-bold border border-indigo-100">
            {{ feat }}
            <button type="button" (click)="removeFeature(i)" class="text-indigo-300 hover:text-red-500">&times;</button>
          </span>
        </div>
      </div>

      <label class="flex items-center gap-4 p-5 bg-slate-50 rounded-3xl border border-slate-300 cursor-pointer">
        <input type="checkbox" formControlName="isActive"
          class="w-5 h-5 rounded border-slate-300 text-indigo-600 focus:ring-indigo-500">
        <div>
          <span class="block text-sm font-black text-slate-700 leading-none">Publicly Visible</span>
          <span class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">Vendors can subscribe
            immediately</span>
        </div>
      </label>

      <div class="flex gap-4 pt-4">
        <button type="button" (click)="closeForm.emit()"
          class="flex-1 py-4 text-sm font-black text-slate-700 hover:text-slate-600 bg-red-200 border border-red-400 rounded-xl">DISCARD</button>
        <button type="submit" [disabled]="planForm.invalid || isLoading"
          class="flex-2 py-4 bg-indigo-300 text-slate-700  border border-indigo-400 rounded-2xl text-sm font-black shadow-lg shadow-indigo-100 hover:bg-indigo-400 hover:text-slate-800 disabled:bg-slate-200 transition-all transform active:scale-95">
          {{ isLoading ? 'SAVING...' : (planData ? 'UPDATE PLAN' : 'Deploy Plan') }}
        </button>


      </div>

    </form>
  </div>
</div>
