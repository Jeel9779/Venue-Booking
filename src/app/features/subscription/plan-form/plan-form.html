<form [formGroup]="planForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-6">

  <!-- Basic Info Section -->
  <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
    <app-form-input 
      label="Plan Name" 
      placeholder="e.g. Premium Business" 
      formControlName="name"
      [error]="planForm.get('name')?.touched && planForm.get('name')?.invalid ? 'Valid name required' : null">
    </app-form-input>

    <app-form-input 
      label="Price (₹)" 
      type="number" 
      placeholder="0" 
      formControlName="price"
      [error]="planForm.get('price')?.touched && planForm.get('price')?.invalid ? 'Price required' : null">
    </app-form-input>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
    <app-form-input 
      label="Duration (Days)" 
      type="number" 
      placeholder="30" 
      formControlName="duration_days"
      [error]="planForm.get('duration_days')?.touched && planForm.get('duration_days')?.invalid ? 'Duration required' : null">
    </app-form-input>

    <div class="flex flex-col">
      <label class="block text-[0.8125rem] font-bold text-slate-700 mb-2 uppercase tracking-wider">Status</label>
      <label class="relative inline-flex items-center cursor-pointer">
        <input type="checkbox" formControlName="is_active" class="sr-only peer">
        <div class="w-11 h-6 bg-slate-200 peer-focus:outline-none peer-focus:ring-4 peer-focus:ring-indigo-300 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-indigo-600"></div>
        <span class="ml-3 text-sm font-bold text-slate-600">{{ planForm.get('is_active')?.value ? 'Active' : 'Inactive' }}</span>
      </label>
    </div>
  </div>

  <!-- Features Section -->
  <div class="space-y-4">
    <label class="block text-[0.8125rem] font-bold text-slate-700 uppercase tracking-wider">Plan Features</label>
    
    <div class="flex gap-2">
      <input 
        type="text" 
        [(ngModel)]="newFeature" 
        [ngModelOptions]="{standalone: true}"
        (keyup.enter)="addFeature()"
        placeholder="Add a feature (e.g. Unlimited Listings)" 
        class="flex-1 h-11 px-4 border border-slate-300 rounded-xl bg-white text-sm outline-none transition focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 shadow-sm ring-1 ring-slate-200">
      <app-button type="button" (onClick)="addFeature()">Add</app-button>
    </div>

    <!-- Features List -->
    <div class="flex flex-wrap gap-2">
      @for (feature of features; track $index) {
        <div class="flex items-center gap-2 px-3 py-1.5 bg-indigo-50 text-indigo-700 rounded-full text-xs font-bold border border-indigo-100 group">
          {{ feature }}
          <button type="button" (click)="removeFeature($index)" class="hover:text-rose-600 transition-colors">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
              <path d="M18 6L6 18M6 6l12 12"/>
            </svg>
          </button>
        </div>
      } @empty {
        <p class="text-xs text-slate-400 font-medium italic">No features added yet.</p>
      }
    </div>
  </div>

  <!-- Footer Actions -->
  <div class="flex items-center justify-end gap-3 mt-4 pt-6 border-t border-slate-100">
    <app-button variant="secondary" type="button" (onClick)="onCancel.emit()">Cancel</app-button>
    <app-button type="submit" [loading]="isLoading()" [disabled]="planForm.invalid">
      {{ plan() ? 'Update Plan' : 'Create Plan' }}
    </app-button>
  </div>

</form>
