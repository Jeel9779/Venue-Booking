<div class="p-6">

  <!-- Title -->
  <h2 class="text-2xl font-semibold mb-6">
    Vendor Subscriptions
  </h2>

  <!-- DATA -->
  <ng-container *ngIf="subscriptions$ | async as subs">

    <table class="w-full border rounded-lg overflow-hidden">

      <!-- HEADER -->
      <thead class="bg-gray-100">
        <tr>
          <th class="p-3 text-left">Vendor</th>
          <th class="p-3 text-left">Plan</th>
          <th class="p-3 text-left">Payment</th>
          <th class="p-3 text-left">Status</th>
          <th class="p-3 text-left">Expiry</th>
          <th class="p-3 text-left">Action</th>
        </tr>
      </thead>

      <!-- BODY -->
      <tbody>

        <tr *ngFor="let sub of subs"
            class="border-t"
            [ngClass]="sub.status === 'active' ? 'bg-green-50' : ''">

          <!-- Vendor -->
          <td class="p-3 font-medium">
            {{ sub.vendorName }}
          </td>

          <!-- Plan -->
          <td class="p-3">
            {{ sub.planName }}
          </td>

          <!-- Payment Status -->
          <td class="p-3">
            <span
              class="px-2 py-1 text-xs rounded font-medium"
              [ngClass]="
                sub.paymentStatus === 'approved'
                  ? 'bg-green-100 text-green-700'
                  : sub.paymentStatus === 'failed'
                  ? 'bg-red-100 text-red-700'
                  : 'bg-yellow-100 text-yellow-700'
              ">
              {{ sub.paymentStatus | titlecase }}
            </span>
          </td>

          <!-- Subscription Status -->
          <td class="p-3">
            <span
              class="px-2 py-1 text-xs rounded font-medium"
              [ngClass]="
                sub.status === 'active'
                  ? 'bg-green-100 text-green-700'
                  : sub.status === 'rejected'
                  ? 'bg-red-100 text-red-700'
                  : 'bg-gray-100 text-gray-700'
              ">
              {{ sub.status | titlecase }}
            </span>
          </td>

          <!-- Expiry -->
          <td class="p-3">
            <span *ngIf="sub.endDate">
              {{ sub.endDate | date:'shortDate' }}
            </span>
            <span *ngIf="!sub.endDate" class="text-gray-400">
              -
            </span>
          </td>

          <!-- Actions -->
          <td class="p-3 space-x-2">

            <!-- Approve -->
            <button
              (click)="approve(sub)"
              [disabled]="sub.status === 'active'"
              class="bg-green-600 text-white px-3 py-1 rounded text-sm 
                     hover:bg-green-700 transition 
                     disabled:opacity-50 disabled:cursor-not-allowed">
              Approve
            </button>

            <!-- Reject -->
            <button
              (click)="reject(sub)"
              [disabled]="sub.status === 'rejected'"
              class="bg-red-600 text-white px-3 py-1 rounded text-sm 
                     hover:bg-red-700 transition 
                     disabled:opacity-50 disabled:cursor-not-allowed">
              Reject
            </button>

          </td>

        </tr>

      </tbody>

    </table>

  </ng-container>

</div>
